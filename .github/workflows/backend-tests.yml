name: Backend Tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fammeal
          POSTGRES_PASSWORD: changeme_pg_password
          POSTGRES_DB: fammeal
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fammeal -d fammeal"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Test (Coverage)
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://fammeal:changeme_pg_password@localhost:5432/fammeal
          REDIS_URL: ""
          JWT_ACCESS_SECRET: test_access_secret_min_32_chars_here!!!!!!
          JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_here!!!!!
          CORS_ORIGIN: "*"
        run: npm run test:coverage
