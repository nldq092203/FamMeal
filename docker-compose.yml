# ============================================================
# FamMeal — Docker Compose (production-like)
# ============================================================
# Usage:
#   docker compose up -d            # start all services
#   docker compose -f docker-compose.yml up -d  # prod-only (skip override)
#
# Dev overrides are in docker-compose.override.yml and are
# automatically loaded by `docker compose up`.
# ============================================================

services:
  # ---- PostgreSQL -------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: fammeal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fammeal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_pg_password}
      POSTGRES_DB: ${POSTGRES_DB:-fammeal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fammeal} -d ${POSTGRES_DB:-fammeal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fammeal-net

  # ---- Redis ------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fammeal-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - fammeal-net

  # ---- Backend (Fastify API) --------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: fammeal-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://fammeal:changeme_pg_password@postgres:5432/fammeal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CACHE_DEFAULT_TTL_SECONDS: ${CACHE_DEFAULT_TTL_SECONDS:-60}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:8080,http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CRON_ENABLED: ${CRON_ENABLED:-false}
      CRON_SECRET: ${CRON_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - fammeal-net

  # ---- Frontend (React SPA via Nginx) -----------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    container_name: fammeal-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fammeal-net

# ---- Volumes ------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---- Networks -----------------------------------------------
networks:
  fammeal-net:
    driver: bridge
